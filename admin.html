<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tie a Knot - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f0e8;
      color: #2c2c2c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 360px;
      min-height: 280px;
      padding: 1rem;
    }
    h1 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 0.8rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #e0dace;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3d6b35;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      font-size: 0.8rem;
    }
    .stat-value {
      font-weight: 700;
      color: #3d6b35;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-top: 0.8rem;
      margin-bottom: 0.4rem;
    }
    .log-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.7rem;
      background: #fff;
      border: 1px solid #e0dace;
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
    }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: #d0c9bd; border-radius: 2px; }
    .log-entry {
      padding: 0.25rem 0;
      border-bottom: 1px solid #f0ebe3;
      word-break: break-all;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .time { color: #999; font-size: 0.65rem; }
    .log-entry .url { color: #c0392b; font-family: "Courier New", monospace; font-size: 0.65rem; }
    .empty {
      color: #b5a999;
      font-style: italic;
      padding: 0.8rem 0;
      text-align: center;
    }
    .btn {
      background: #fff;
      border: 1px solid #e0dace;
      color: #2c2c2c;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover { background: #f0ebe3; }
    .btn-danger { color: #c0392b; }
    .btn-danger:hover { background: #fdf2f0; }
    .btn-row { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
  </style>
</head>
<body>
  <h1>Tie a Knot</h1>

  <div class="status">
    <span class="status-dot"></span>
    <span>Active - 219 rules blocked</span>
  </div>

  <div class="stat">
    <span>Total blocks</span>
    <span class="stat-value" id="total-count">0</span>
  </div>
  <div class="stat">
    <span>Log entries</span>
    <span class="stat-value" id="log-count">0</span>
  </div>

  <div class="section-title">Recent Block Log</div>
  <div class="log-list" id="log-list">
    <div class="empty">No blocks yet. Scouts are behaving... for now.</div>
  </div>

  <div class="btn-row">
    <button class="btn" id="btn-refresh">↻ Refresh</button>
    <button class="btn btn-danger" id="btn-clear">Clear Log</button>
  </div>

  <script src="admin.js"></script>
</body>
</html>
