<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BLOCKED - Tie a Knot</title>
        <link rel="stylesheet" href="redirect.css" />
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Site Blocked</h1>
                <p class="subtitle">Tie a Knot - Scout Distraction Shield</p>
            </div>

            <div class="card">
                <div class="blocked-label">Blocked URL</div>
            </div>

            <div class="message" id="cheeky-message">Loading wisdom...</div>

            <div class="countdown-section">
                <p>
                    Redirecting to
                    <a
                        href="https://www.animatedknots.com"
                        class="redirect-link"
                        >animatedknots.com</a
                    >
                    in
                    <span class="countdown-num" id="countdown">10</span> seconds
                </p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="footer">
                Tie a Knot - keeping scouts focused since 2026
            </div>
        </div>

        <script src="redirect.js"></script>
    </body>
</html>
